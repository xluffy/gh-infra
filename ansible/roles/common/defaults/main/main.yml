node_exporter_url: "https://github.com/prometheus/node_exporter/releases/download/v0.18.0/node_exporter-0.18.0.linux-amd64.tar.gz"
node_exporter_file: "/usr/src/build/node_exporter-0.18.0.linux-amd64.tar.gz"
node_exporter_src_bin: "/usr/src/build/node_exporter-0.18.0.linux-amd64/node_exporter"
node_exporter_dest_bin: "/usr/local/bin/node_exporter"

bat_version: "0.12.1"
bat_url: "https://github.com/sharkdp/bat/releases/download/v{{ bat_version }}/bat_{{ bat_version }}_amd64.deb"

ripgrep_version: "11.0.2"
ripgrep_url: "https://github.com/BurntSushi/ripgrep/releases/download/{{ ripgrep_version }}/ripgrep_{{ ripgrep_version }}_amd64.deb"

quang_ssh_public_key: "ssh-rsa "

sysctl:
  net_ipv4_ip_forward: 0
