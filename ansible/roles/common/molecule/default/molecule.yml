---
dependency:
  name: galaxy
driver:
  name: vagrant
  provider:
    name: virtualbox
lint:
  name: yamllint
platforms:
  - name: vg-ubuntu-18-test
    box: ubuntu/bionic64
    memory: 1024
    groups:
      - app
provisioner:
  name: ansible
  log: true
  config_options:
    defaults:
      vault_password_file: ${MOLECULE_SCENARIO_DIRECTORY}/.vault_pass
      callback_whitelist: profile_tasks, timer
      stdout_callback: debug
      gathering: smart
    ssh_connection:
      pipelining: True
      control_path: /tmp/ansible-ssh-%%h-%%p-%%r
  lint:
    name: ansible-lint
scenario:
  name: default
verifier:
  name: testinfra
  env:
    PYTHONWARNINGS: "ignore:.*U.*mode is deprecated:DeprecationWarning"
  lint:
    name: flake8
  options:
    v: true
